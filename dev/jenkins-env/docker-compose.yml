x-jenkins-common: &jenkins-common
  build:
    context: ./docker
    dockerfile: Dockerfile
  restart: unless-stopped
  healthcheck:
    # /jenkins/ プレフィックスでアクセス（コンテナ内ポートは 8080）
    test: ["CMD", "curl", "-fsS", "http://localhost:8080/jenkins/login"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 90s

services:
  jenkins-a:
    <<: *jenkins-common
    container_name: lrr-jenkins-a
    ports:
      - "8081:8080"
    volumes:
      - ./jha:/var/jenkins_home

  jenkins-b:
    <<: *jenkins-common
    container_name: lrr-jenkins-b
    ports:
      - "8082:8080"
    volumes:
      - ./jhb:/var/jenkins_home

  jenkins-c:
    <<: *jenkins-common
    container_name: lrr-jenkins-c
    ports:
      - "8083:8080"
    volumes:
      - ./jhc:/var/jenkins_home

  jenkins-d:
    <<: *jenkins-common
    container_name: lrr-jenkins-d
    ports:
      - "8084:8080"
    volumes:
      - ./jhd:/var/jenkins_home
